<script>
        // 1. Konfigurasi YouTube Data API v3
        // PERHATIAN: Masukkan API Key Anda di bawah ini
        const API_KEY = 'AIzaSyDH3naOGPlOL175VfhVaRrzr0438MymNxM'; 
        // ID Playlist (Contoh menggunakan playlist ID, bisa diganti milik Anda)
        const PLAYLIST_ID = 'PLNAQymMf9eabYCs_eGh_hb7CK4Bdl5_5o'; 

        let playlistData = [];
        let player;
        let currentVideoIndex = 0;
        let isApiReady = false;
        let isDataReady = false;

        // 2. Fungsi Asinkron untuk mengambil data dari YouTube Data API v3
        async function fetchPlaylistData() {
            try {
                if (API_KEY === 'API_KEY' || API_KEY === '') {
                    throw new Error('API Key belum diatur. Menggunakan data fallback.');
                }
                
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Filter item yang tidak ada videoId-nya (biasanya video private/deleted)
                const validItems = data.items.filter(item => item.snippet.resourceId.videoId);
                
                playlistData = validItems.map(item => {
                    const snippet = item.snippet;
                    return {
                        id: snippet.resourceId.videoId,
                        title: snippet.title,
                        author: snippet.videoOwnerChannelTitle || 'Unknown Channel',
                        date: new Date(snippet.publishedAt).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }),
                        description: snippet.description || 'Tidak ada deskripsi.',
                        thumbnail: snippet.thumbnails.medium ? snippet.thumbnails.medium.url : (snippet.thumbnails.default ? snippet.thumbnails.default.url : '')
                    };
                });

            } catch (error) {
                console.warn(error.message);
                // Fallback Dummy Data jika API gagal/tidak ada API key (untuk demo)
                playlistData = [
                    {
                        id: 'dQw4w9WgXcQ',
                        title: 'Data Mock: Masukkan API Key YouTube v3 Anda',
                        author: 'Rick Astley',
                        date: '24 Okt 2009',
                        description: 'Untuk mengambil playlist nyata, Anda harus mengganti variabel API_KEY dengan key valid dari Google Cloud Console.',
                        thumbnail: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg'
                    },
                    {
                        id: '9bZkp7q19f0',
                        title: 'PSY - GANGNAM STYLE(강남스타일) M/V',
                        author: 'officialpsy',
                        date: '15 Jul 2012',
                        description: 'Pastikan Anda mendaftar di Google Cloud Console untuk mendapatkan YouTube Data API v3 Key untuk fetch playlist dinamis.',
                        thumbnail: 'https://img.youtube.com/vi/9bZkp7q19f0/mqdefault.jpg'
                    }
                ];
            }

            isDataReady = true;
            tryInitPlayer(); // Coba init player jika iframe api juga sudah siap
        }

        // 3. Muat YouTube IFrame API secara Asinkron (untuk pemutarnya)
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 4. Dipanggil oleh YouTube IFrame API setelah script siap
        function onYouTubeIframeAPIReady() {
            isApiReady = true;
            tryInitPlayer();
        }

        // 5. Inisialisasi Player (Hanya jalan jika Data & IFrame API siap)
        function tryInitPlayer() {
            if (isApiReady && isDataReady && playlistData.length > 0) {
                player = new YT.Player('youtube-player', {
                    height: '100%',
                    width: '100%',
                    videoId: playlistData[0].id,
                    playerVars: {
                        'playsinline': 1,
                        'rel': 0,
                        'modestbranding': 1
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }
        }

        function onPlayerReady(event) {
            updateVideoInfo(currentVideoIndex);
            renderPlaylist();
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                playNextVideo();
            }
        }

        function playNextVideo() {
            currentVideoIndex++;
            if (currentVideoIndex >= playlistData.length) {
                currentVideoIndex = 0;
            }
            loadVideo(currentVideoIndex);
        }

        function loadVideo(index) {
            currentVideoIndex = index;
            const videoId = playlistData[index].id;
            
            if(player && player.loadVideoById) {
                player.loadVideoById(videoId);
            }

            updateVideoInfo(index);
            updatePlaylistUI();
        }

        function updateVideoInfo(index) {
            const video = playlistData[index];
            document.getElementById('video-title').textContent = video.title;
            document.getElementById('video-title').title = video.title;
            document.getElementById('video-author').textContent = video.author;
            document.getElementById('video-date').textContent = video.date;
            
            const formattedDesc = video.description.replace(/\n/g, '<br>');
            document.getElementById('video-description').innerHTML = formattedDesc;
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = ''; 
            
            document.getElementById('playlist-count').textContent = `${playlistData.length} Video`;

            playlistData.forEach((video, index) => {
                const isActive = index === currentVideoIndex ? 'active' : '';
                
                const itemHTML = `
                    <div class="playlist-item ${isActive} flex gap-3 p-2 rounded-lg cursor-pointer hover:bg-gray-700 transition-colors duration-200 border border-transparent" 
                         onclick="loadVideo(${index})">
                        
                        <div class="relative w-28 h-16 flex-shrink-0 bg-gray-800 rounded overflow-hidden">
                            <img src="${video.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover">
                            ${index === currentVideoIndex ? 
                                `<div class="absolute inset-0 bg-black/60 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>` 
                            : ''}
                        </div>

                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <h4 class="text-sm font-semibold text-gray-100 line-clamp-2 leading-tight mb-1">${video.title}</h4>
                            <p class="text-xs text-gray-400 truncate">${video.author}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
            
            scrollToActiveItem();
        }

        function updatePlaylistUI() {
            renderPlaylist();
        }

        function scrollToActiveItem() {
            setTimeout(() => {
                const activeItem = document.querySelector('.playlist-item.active');
                const container = document.getElementById('playlist-container');
                if (activeItem && container) {
                    const containerRect = container.getBoundingClientRect();
                    const itemRect = activeItem.getBoundingClientRect();

                    if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) {
                         activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            }, 100);
        }

        // Mulai ambil data saat halaman dimuat
        fetchPlaylistData();
</script>
