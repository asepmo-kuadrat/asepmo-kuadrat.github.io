<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Firebase Firestore</title>
<style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        input, button { display: block; width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
        input { border: 1px solid #ccc; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        ul { list-style-type: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group button { width: auto; display: inline-block; margin: 0 2px; padding: 5px 10px; font-size: 12px; }
        .btn-edit { background-color: #ff9800; }
        .btn-delete { background-color: #f44336; }
</style>
  </head>
  <body>

	<div class="container">
	  <h2>Form Pengguna (Create / Update)</h2>
	  <input type="hidden" id="userId">

	  <input type="text" id="nama" placeholder="Nama Lengkap">
	  <input type="number" id="umur" placeholder="Umur">
	  <input type="text" id="role" placeholder="Role (cth: Admin, Developer)">
	  <button id="btnSimpan">Simpan Data</button>

	  <h2>Daftar Pengguna (Read)</h2>
	  <ul id="userList"></ul>
	</div>

<script type="module">
    // 1. Import SDK Firebase yang dibutuhkan dari CDN resmi
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. GANTI DENGAN KONFIGURASI FIREBASE ANDA SENDIRI
    const firebaseConfig = {
        apiKey: "AIzaSyAIZwCXKW-tL3e6oDGOLLbrU9pD6lgrA6c",
        authDomain: "asepmo-article.firebaseapp.com",
        projectId: "asepmo-article",
        storageBucket: "asepmo-article.firebasestorage.app",
        messagingSenderId: "622595990822",
        appId: "1:622595990822:web:514b840a8cfb503dd34de7",
        measurementId: "G-HQV0SR7132"
    };

    // Inisialisasi Firebase & Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const usersCollection = collection(db, "users");

    // Ambil elemen DOM
    const userIdInput = document.getElementById('userId');
    const namaInput = document.getElementById('nama');
    const umurInput = document.getElementById('umur');
    const roleInput = document.getElementById('role');
    const btnSimpan = document.getElementById('btnSimpan');
    const userList = document.getElementById('userList');

    // ==========================================
    // A. MENULIS & MENGEDIT DATA (Create & Update)
    // ==========================================
    btnSimpan.addEventListener('click', async () => {
        const id = userIdInput.value;
        const data = {
            nama: namaInput.value,
            umur: parseInt(umurInput.value),
            role: roleInput.value
        };

        if (!data.nama || !data.umur || !data.role) {
            alert("Semua field harus diisi!");
            return;
        }

        try {
            if (id === "") {
                // Jika ID kosong, berarti data baru (CREATE)
                await addDoc(usersCollection, data);
                alert("Data berhasil ditambahkan!");
            } else {
                // Jika ID ada, berarti data lama diubah (UPDATE)
                const docRef = doc(db, "users", id);
                await updateDoc(docRef, data);
                alert("Data berhasil diperbarui!");
                btnSimpan.textContent = "Simpan Data"; // Kembalikan teks tombol
            }
            resetForm();
        } catch (error) {
            console.error("Error: ", error);
        }
    });

    // ==========================================
    // B. MEMBACA DATA SECARA REAL-TIME (Read)
    // ==========================================
    // onSnapshot akan otomatis berjalan setiap ada perubahan data di Firebase
    onSnapshot(usersCollection, (snapshot) => {
        userList.innerHTML = ""; // Bersihkan list lama
        snapshot.forEach((doc) => {
            const user = doc.data();
            const li = document.createElement('li');
            
            li.innerHTML = `
                <div>
                    <strong>${user.nama}</strong> (${user.umur} tahun) <br>
                    <small>Role: ${user.role}</small>
                </div>
                <div class="btn-group">
                    <button class="btn-edit" data-id="${doc.id}" data-nama="${user.nama}" data-umur="${user.umur}" data-role="${user.role}">Edit</button>
                    <button class="btn-delete" data-id="${doc.id}">Hapus</button>
                </div>
            `;
            userList.appendChild(li);
        });

        // Pasang event listener ke tombol edit dan hapus yang baru dibuat
        tambahkanEventListenerTombol();
    });

    // Fungsi pembantu untuk memicu aksi Edit dan Hapus
    function tambahkanEventListenerTombol() {
        // Aksi Tombol Edit
        document.querySelectorAll('.btn-edit').forEach(button => {
            button.addEventListener('click', (e) => {
                userIdInput.value = e.target.dataset.id;
                namaInput.value = e.target.dataset.nama;
                umurInput.value = e.target.dataset.umur;
                roleInput.value = e.target.dataset.role;
                btnSimpan.textContent = "Perbarui Data"; // Ubah teks tombol
            });
        });

        // ==========================================
        // C. MENGHAPUS DATA (Delete)
        // ==========================================
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', async (e) => {
                const id = e.target.dataset.id;
                if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                    try {
                        await deleteDoc(doc(db, "users", id));
                        alert("Data berhasil dihapus!");
                    } catch (error) {
                        console.error("Error saat menghapus: ", error);
                    }
                }
            });
        });
    }

    // Fungsi untuk membersihkan form inputan
    function resetForm() {
        userIdInput.value = "";
        namaInput.value = "";
        umurInput.value = "";
        roleInput.value = "";
    }
</script>

  </body>
</html>
