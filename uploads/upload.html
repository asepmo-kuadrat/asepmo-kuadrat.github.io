<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub File Uploader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Fallback */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #1f2937;
            min-height: 100vh;
        }

        /* Glassmorphism styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Drag and drop zone active state */
        .drag-active {
            border-color: #3b82f6 !important;
            background-color: rgba(59, 130, 246, 0.05) !important;
        }

        /* Custom file input hiding */
        input[type="file"] {
            display: none;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <main class="w-full max-w-lg">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white text-gray-900 mb-4 shadow-lg">
                <i class="ph ph-github-logo text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">GitHub Uploader</h1>
            <p class="text-gray-300 mt-2 text-sm">Unggah file langsung ke repository Anda dengan aman.</p>
        </div>

        <!-- Main Card -->
        <div class="glass-panel rounded-2xl overflow-hidden p-8">
            
            <form id="uploadForm" class="space-y-6">
                
                <!-- Credentials Section -->
                <div class="space-y-4">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Kredensial & Tujuan</h2>
                    
                    <div>
                        <label for="ghToken" class="block text-sm font-medium text-gray-700">Personal Access Token</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-key text-gray-400"></i>
                            </div>
                            <input type="password" id="ghToken" name="ghToken" 
                                class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 px-3 border outline-none transition-colors" 
                                placeholder="ghp_xxxxxxxxxxxxxxxxx" required>
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Token Anda hanya digunakan di browser dan tidak disimpan.</p>
                    </div>

                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div>
                            <label for="ghOwner" class="block text-sm font-medium text-gray-700">Pemilik (Owner)</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="ph ph-user text-gray-400"></i>
                                </div>
                                <input type="text" id="ghOwner" name="ghOwner" 
                                    class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 px-3 border outline-none transition-colors" 
                                    placeholder="Username" required>
                            </div>
                        </div>
                        <div>
                            <label for="ghRepo" class="block text-sm font-medium text-gray-700">Repository</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="ph ph-folder text-gray-400"></i>
                                </div>
                                <input type="text" id="ghRepo" name="ghRepo" 
                                    class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 px-3 border outline-none transition-colors" 
                                    placeholder="Nama Repo" required>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <label for="ghPath" class="block text-sm font-medium text-gray-700">Path Folder (Opsional)</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-folder-open text-gray-400"></i>
                            </div>
                            <input type="text" id="ghPath" name="ghPath" 
                                class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 px-3 border outline-none transition-colors" 
                                placeholder="Contoh: assets/images">
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-200 pt-6"></div>

                <!-- File Upload Section -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Pilih File</h2>
                    
                    <div id="dropZone" class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl transition-all duration-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <div class="space-y-1 text-center">
                            <i class="ph ph-upload-simple text-4xl text-gray-400 mb-2"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label for="fileInput" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500 px-1">
                                    <span>Klik untuk memilih file</span>
                                    <input id="fileInput" name="fileInput" type="file" required>
                                </label>
                                <p class="pl-1">atau seret ke sini</p>
                            </div>
                            <p class="text-xs text-gray-500 mt-2" id="fileNameDisplay">Belum ada file yang dipilih</p>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 transition-colors">
                        <span id="btnText">Unggah ke GitHub</span>
                        <div id="btnSpinner" class="spinner hidden ml-2"></div>
                    </button>
                </div>
            </form>

            <!-- Alert Notification (Hidden by default) -->
            <div id="alertBox" class="mt-6 rounded-lg p-4 hidden transition-all duration-300">
                <div class="flex">
                    <div class="flex-shrink-0" id="alertIcon">
                        <!-- Icon will be injected here -->
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium" id="alertTitle"></h3>
                        <div class="mt-2 text-sm" id="alertMessage"></div>
                    </div>
                </div>
            </div>

        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8 text-sm text-gray-400">
            <p>Dibuat untuk mempermudah upload statis.</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('uploadForm');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const alertBox = document.getElementById('alertBox');
            const alertIcon = document.getElementById('alertIcon');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');

            // --- UI State Management ---
            
            function setLoading(isLoading) {
                if (isLoading) {
                    submitBtn.disabled = true;
                    submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
                    btnText.innerText = 'Mengunggah...';
                    btnSpinner.classList.remove('hidden');
                    hideAlert();
                } else {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    btnText.innerText = 'Unggah ke GitHub';
                    btnSpinner.classList.add('hidden');
                }
            }

            function showAlert(type, title, messageHtml) {
                alertBox.classList.remove('hidden', 'bg-green-50', 'bg-red-50', 'text-green-800', 'text-red-800');
                
                if (type === 'success') {
                    alertBox.classList.add('bg-green-50', 'text-green-800');
                    alertIcon.innerHTML = '<i class="ph-fill ph-check-circle text-green-400 text-xl"></i>';
                } else {
                    alertBox.classList.add('bg-red-50', 'text-red-800');
                    alertIcon.innerHTML = '<i class="ph-fill ph-x-circle text-red-400 text-xl"></i>';
                }

                alertTitle.innerText = title;
                alertMessage.innerHTML = messageHtml;
            }

            function hideAlert() {
                alertBox.classList.add('hidden');
            }

            // --- Drag and Drop Handling ---

            // Prevent default drag behaviors
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            // Highlight drop zone when item is dragged over it
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });

            function highlight(e) {
                dropZone.classList.add('drag-active');
            }

            function unhighlight(e) {
                dropZone.classList.remove('drag-active');
            }

            // Handle dropped files
            dropZone.addEventListener('drop', handleDrop, false);

            function handleDrop(e) {
                let dt = e.dataTransfer;
                let files = dt.files;

                if (files.length > 0) {
                    fileInput.files = files; // Assign files to input
                    updateFileNameDisplay();
                }
            }

            // Trigger click on dropzone to open file dialog
            dropZone.addEventListener('click', (e) => {
                if(e.target !== fileInput) {
                     fileInput.click();
                }
            });

            // Update text when file selected via dialog
            fileInput.addEventListener('change', updateFileNameDisplay);

            function updateFileNameDisplay() {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileSize = (file.size / 1024).toFixed(1); // KB
                    fileNameDisplay.innerHTML = `<span class="font-semibold text-blue-600">${file.name}</span> (${fileSize} KB)`;
                } else {
                    fileNameDisplay.innerText = 'Belum ada file yang dipilih';
                }
            }

            // --- Form Submission & GitHub API Logic ---

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const token = document.getElementById('ghToken').value.trim();
                const owner = document.getElementById('ghOwner').value.trim();
                const repo = document.getElementById('ghRepo').value.trim();
                let pathFolder = document.getElementById('ghPath').value.trim();
                
                if (fileInput.files.length === 0) {
                    showAlert('error', 'Validasi Gagal', 'Harap pilih file terlebih dahulu.');
                    return;
                }

                const file = fileInput.files[0];
                
                // Format path
                if (pathFolder && !pathFolder.endsWith('/')) {
                    pathFolder += '/';
                }
                // Hapus slash di awal jika ada
                if (pathFolder.startsWith('/')) {
                    pathFolder = pathFolder.substring(1);
                }
                
                const filePath = `${pathFolder}${file.name}`;

                setLoading(true);

                const reader = new FileReader();
                reader.onload = async function(event) {
                    try {
                        const base64Content = event.target.result.split(',')[1];
                        
                        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                        const bodyData = {
                            message: `Upload ${file.name} via Web Uploader`,
                            content: base64Content
                        };

                        const response = await fetch(url, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(bodyData)
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            throw new Error(data.message || `HTTP Error ${response.status}`);
                        }

                        // Success
                        showAlert(
                            'success', 
                            'Unggah Berhasil!', 
                            `<p>File telah berhasil ditambahkan ke repository.</p>
                             <a href="${data.content.html_url}" target="_blank" class="mt-2 inline-flex items-center text-blue-600 hover:text-blue-800 font-medium">
                                Lihat di GitHub <i class="ph ph-arrow-square-out ml-1"></i>
                             </a>`
                        );
                        
                        // Reset file input after success
                        fileInput.value = '';
                        updateFileNameDisplay();

                    } catch (error) {
                        let errorMessage = error.message;
                        if (errorMessage.includes('Bad credentials')) {
                            errorMessage = 'Token tidak valid atau sudah kedaluwarsa (Bad credentials).';
                        } else if (errorMessage.includes('Not Found')) {
                            errorMessage = 'Repository tidak ditemukan. Pastikan username dan nama repo benar, dan token memiliki akses.';
                        } else if (errorMessage.includes('Invalid request. "sha" wasn\'t supplied.')) {
                            errorMessage = 'File dengan nama yang sama sudah ada di path tersebut. API ini saat ini hanya mendukung pembuatan file baru, bukan menimpa file.';
                        }

                        showAlert('error', 'Gagal Mengunggah', errorMessage);
                    } finally {
                        setLoading(false);
                    }
                };

                reader.onerror = function() {
                    showAlert('error', 'Error Membaca File', 'Gagal memproses file di browser.');
                    setLoading(false);
                };

                // Mulai membaca file
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>
