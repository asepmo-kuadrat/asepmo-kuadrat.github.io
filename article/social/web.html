<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Favorite | Keren & Elegan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6', darkbg: '#0f172a' } } }
        }
</script>
<style>
        /* Transisi halus untuk dark/light mode */
        body { transition: background-color 0.3s, color 0.3s; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
</style>
  </head>
  <body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 min-h-screen">

    <nav class="sticky top-0 z-50 glass-panel shadow-md px-4 py-3 flex justify-between items-center">
	  <div class="flex items-center gap-4">
		<button id="drawer-btn" class="text-xl focus:outline-none hover:text-primary transition"><i class="fas fa-bars"></i></button>
		<h1 class="text-2xl font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">WebFav.</h1>
	  </div>
	  <div class="flex items-center gap-4">
		<button id="theme-toggle" class="text-xl focus:outline-none hover:text-primary transition"><i class="fas fa-moon"></i></button>
		<div class="relative group">
		  <button class="text-xl focus:outline-none hover:text-primary transition"><i class="fas fa-ellipsis-v"></i></button>
		  <div class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white dark:bg-gray-800 ring-1 ring-black ring-opacity-5 hidden group-hover:block transition-all">
			<div class="py-1">
			  <a href="#" id="auth-btn" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">Login</a>
			  <a href="#" id="logout-btn" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700 hidden">Logout</a>
			</div>
		  </div>
		</div>
	  </div>
    </nav>

    <div id="drawer" class="fixed inset-y-0 left-0 transform -translate-x-full w-64 glass-panel z-40 transition-transform duration-300 pt-20 px-6">
	  <ul class="space-y-4 text-lg">
		<li><a href="#" class="hover:text-primary transition flex items-center gap-3"><i class="fas fa-home"></i> Beranda</a></li>
		<li><a href="#" class="hover:text-primary transition flex items-center gap-3"><i class="fas fa-star"></i> Koleksiku</a></li>
		<li><a href="#" class="hover:text-primary transition flex items-center gap-3"><i class="fas fa-cog"></i> Pengaturan</a></li>
	  </ul>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
	  <div class="bg-white dark:bg-gray-800 rounded-xl p-8 w-96 shadow-2xl relative">
		<button id="close-modal" class="absolute top-4 right-4 text-gray-500 hover:text-red-500"><i class="fas fa-times"></i></button>
		<h2 id="modal-title" class="text-2xl font-bold mb-6 text-center">Login</h2>
		<form id="auth-form" class="space-y-4">
		  <div>
			<label class="block text-sm font-medium mb-1">Email</label>
			<input type="email" id="email" class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 border-none focus:ring-2 focus:ring-primary" required>
		  </div>
		  <div>
			<label class="block text-sm font-medium mb-1">Password</label>
			<input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 border-none focus:ring-2 focus:ring-primary" required>
		  </div>
		  <button type="submit" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-2 rounded-lg transition">Masuk</button>
		</form>
		<p class="mt-4 text-center text-sm">
		  <span id="toggle-auth-text">Belum punya akun?</span> 
		  <button id="toggle-auth-mode" class="text-primary hover:underline font-semibold">Daftar</button>
		</p>
	  </div>
    </div>

    <div class="container mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">

	  <div class="w-full md:w-1/2 space-y-6">
		<div class="glass-panel p-6 rounded-2xl shadow-lg">
		  <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fab fa-google text-blue-500"></i> Eksplorasi Website</h2>
		  <div class="flex gap-2">
			<input type="url" id="search-url" placeholder="Masukkan URL website..." class="flex-1 px-4 py-2 rounded-lg bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
			<button id="extract-search-btn" class="bg-gray-800 dark:bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition"><i class="fas fa-search"></i> Ekstrak</button>
		  </div>
		  <div id="search-result" class="mt-4 hidden">
		  </div>
		</div>

		<div class="glass-panel p-6 rounded-2xl shadow-lg">
		  <h3 class="font-bold mb-3">Website Populer</h3>
		  <ul class="space-y-2">
			<li class="flex items-center gap-3 p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg cursor-pointer transition">
			  <img src="https://www.google.com/favicon.ico" class="w-6 h-6"> <span>Google</span>
			</li>
			<li class="flex items-center gap-3 p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg cursor-pointer transition">
			  <img src="https://github.githubassets.com/favicons/favicon.png" class="w-6 h-6"> <span>GitHub</span>
			</li>
		  </ul>
		</div>
	  </div>

	  <div class="w-full md:w-1/2 space-y-6">
		<div class="glass-panel p-6 rounded-2xl shadow-lg">
		  <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-bookmark text-primary"></i> Tambah ke Favorit</h2>
		  <div class="flex gap-2">
			<input type="url" id="fav-url" placeholder="https://..." class="flex-1 px-4 py-2 rounded-lg bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
			<button id="add-fav-btn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition font-bold shadow-lg shadow-blue-500/50"><i class="fas fa-plus"></i> Tambah</button>
		  </div>
		</div>

		<div id="favorites-list" class="space-y-4">
		  <p class="text-gray-500 text-center italic mt-10">Silakan login untuk melihat dan menambah koleksi favorit Anda.</p>
		</div>
	  </div>

    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 1. KONFIGURASI FIREBASE (GANTI DENGAN MILIK ANDA)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAIZwCXKW-tL3e6oDGOLLbrU9pD6lgrA6c",
		    authDomain: "asepmo-article.firebaseapp.com",
		    projectId: "asepmo-article",
		    storageBucket: "asepmo-article.firebasestorage.app",
			messagingSenderId: "622595990822",
			appId: "1:622595990822:web:514b840a8cfb503dd34de7",
			measurementId: "G-HQV0SR7132"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // 2. UI & THEME LOGIC
        // ==========================================
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        const drawerBtn = document.getElementById('drawer-btn');
        const drawer = document.getElementById('drawer');
        drawerBtn.addEventListener('click', () => {
            drawer.classList.toggle('-translate-x-full');
        });

        // ==========================================
        // 3. AUTHENTICATION LOGIC (Login/Register)
        // ==========================================
        let isLoginMode = true;
        const authModal = document.getElementById('auth-modal');
        const closeAuth = document.getElementById('close-modal');
        const authBtn = document.getElementById('auth-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authForm = document.getElementById('auth-form');
        const toggleAuthMode = document.getElementById('toggle-auth-mode');

        authBtn.addEventListener('click', () => authModal.classList.remove('hidden'));
        closeAuth.addEventListener('click', () => authModal.classList.add('hidden'));

        toggleAuthMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('modal-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('toggle-auth-text').innerText = isLoginMode ? "Belum punya akun?" : "Sudah punya akun?";
            toggleAuthMode.innerText = isLoginMode ? "Daftar" : "Masuk";
            authForm.querySelector('button').innerText = isLoginMode ? "Masuk" : "Daftar";
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                if(isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    alert("Login berhasil!");
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Registrasi berhasil!");
                }
                authModal.classList.add('hidden');
                authForm.reset();
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            alert("Berhasil logout!");
        });

        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                loadFavorites();
            } else {
                authBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                document.getElementById('favorites-list').innerHTML = '<p class="text-gray-500 text-center italic mt-10">Silakan login untuk melihat dan menambah koleksi favorit Anda.</p>';
            }
        });

        // ==========================================
        // 4. LOGIKA EKSTRAKSI METADATA WEBSITE
        // ==========================================
        // Menggunakan Microlink API gratis untuk mem-bypass CORS
        async function extractWebsiteInfo(url) {
            try {
                const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.status !== "success") throw new Error("Gagal mengekstrak");
                
                return {
                    title: data.data.title || "Tanpa Judul",
                    description: data.data.description || "Tidak ada deskripsi tersedia.",
                    image: data.data.image?.url || "https://via.placeholder.com/400x200?text=No+Image",
                    favicon: data.data.logo?.url || "https://via.placeholder.com/32?text=F",
                    url: data.data.url
                };
            } catch (error) {
                alert("Gagal mengekstrak URL. Pastikan format valid (menggunakan https://)");
                return null;
            }
        }

        // Fungsi Render Card
        function createCardHTML(info) {
            return `
                <div class="glass-panel p-4 rounded-xl flex flex-col md:flex-row gap-4 relative overflow-hidden group hover:scale-[1.01] transition-transform">
                    <img src="${info.image}" alt="Preview" class="w-full md:w-32 h-32 object-cover rounded-lg border border-gray-200 dark:border-gray-700">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <img src="${info.favicon}" class="w-5 h-5 rounded">
                            <h4 class="font-bold text-lg line-clamp-1">${info.title}</h4>
                        </div>
                        <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-2 mb-2">${info.description}</p>
                        <a href="${info.url}" target="_blank" class="text-primary text-sm hover:underline"><i class="fas fa-external-link-alt"></i> Kunjungi Website</a>
                    </div>
                </div>
            `;
        }

        // Kolom 1: Tes Ekstrak
        document.getElementById('extract-search-btn').addEventListener('click', async () => {
            const url = document.getElementById('search-url').value;
            if(!url) return;
            const btn = document.getElementById('extract-search-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const info = await extractWebsiteInfo(url);
            if(info) {
                const container = document.getElementById('search-result');
                container.innerHTML = createCardHTML(info);
                container.classList.remove('hidden');
            }
            btn.innerHTML = '<i class="fas fa-search"></i> Ekstrak';
        });

        // ==========================================
        // 5. SIMPAN KE FIREBASE FIRESTORE
        // ==========================================
        document.getElementById('add-fav-btn').addEventListener('click', async () => {
            if(!currentUser) return alert("Anda harus login terlebih dahulu!");
            
            const url = document.getElementById('fav-url').value;
            if(!url) return;

            const btn = document.getElementById('add-fav-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            
            const info = await extractWebsiteInfo(url);
            if(info) {
                try {
                    await addDoc(collection(db, "users", currentUser.uid, "favorites"), {
                        ...info,
                        createdAt: serverTimestamp()
                    });
                    document.getElementById('fav-url').value = '';
                } catch (error) {
                    console.error("Error adding document: ", error);
                    alert("Gagal menyimpan ke database.");
                }
            }
            btn.innerHTML = originalText;
        });

        // Load Realtime Data Favorites
        function loadFavorites() {
            const listContainer = document.getElementById('favorites-list');
            const q = query(collection(db, "users", currentUser.uid, "favorites"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                listContainer.innerHTML = '';
                if(snapshot.empty) {
                    listContainer.innerHTML = '<p class="text-center text-gray-500 italic mt-4">Belum ada website favorit. Tambahkan sekarang!</p>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    listContainer.innerHTML += createCardHTML(data);
                });
            });
        }
</script>
  </body>
</html>
