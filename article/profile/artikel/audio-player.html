<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
        }

        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6; /* blue-500 */
            cursor: pointer;
            margin-top: -6px; /* You need to specify a margin in Chrome, but in Firefox and IE it is automatic */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #475569; /* slate-600 */
            border-radius: 2px;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Toast Notification Styling */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #ef4444; /* red-500 */
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 16px;
            position: fixed;
            z-index: 50;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7); /* slate-800 with opacity */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
</style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative overflow-hidden">

    <!-- Background Decor -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

    <main class="w-full max-w-md glass-panel rounded-3xl shadow-2xl overflow-hidden relative z-10 transition-all duration-300">
	  <!-- Header -->
	  <div class="p-6 pb-4 border-b border-slate-700/50 flex justify-between items-center">
		<h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
		  <i class="fa-solid fa-music text-blue-400"></i> Audio Player
		</h1>
		<div id="status-indicator" class="flex items-center gap-2 text-xs font-medium text-slate-400">
		  <span class="relative flex h-3 w-3">
			<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
			<span class="relative inline-flex rounded-full h-3 w-3 bg-slate-500"></span>
		  </span>
		  Siap
		</div>
	  </div>

	  <div class="p-6">
		<!-- Tabs -->
		<div class="flex bg-slate-800/50 rounded-xl p-1 mb-6 border border-slate-700/50">
		  <button id="tab-local" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white shadow transition-all" onclick="switchTab('local')">
			<i class="fa-solid fa-folder-open mr-2"></i>File Lokal (Offline)
		  </button>
		  <button id="tab-url" class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all" onclick="switchTab('url')">
			<i class="fa-solid fa-link mr-2"></i>URL (Online)
		  </button>
		</div>

		<!-- Input Area -->
		<div class="mb-8 min-h-[100px] flex flex-col justify-center">
		  <!-- Local File Input -->
		  <div id="input-local" class="block transition-all duration-300">
			<label for="file-upload" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-600 border-dashed rounded-xl cursor-pointer bg-slate-800/30 hover:bg-slate-700/50 hover:border-blue-500 transition-all group">
			  <div class="flex flex-col items-center justify-center pt-5 pb-6">
				<i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 group-hover:text-blue-400 mb-3 transition-colors"></i>
				<p class="mb-1 text-sm text-slate-300"><span class="font-semibold text-blue-400">Klik untuk unggah</span> atau drag file</p>
				<p class="text-xs text-slate-500">MP3, WAV, OGG (Bisa Offline)</p>
			  </div>
			  <input id="file-upload" type="file" accept="audio/*" class="hidden" />
			</label>
		  </div>

		  <!-- URL Input -->
		  <div id="input-url" class="hidden transition-all duration-300">
			<div class="flex flex-col gap-3">
			  <label for="url-input" class="text-sm text-slate-300 font-medium">Masukkan Tautan Audio:</label>
			  <div class="flex gap-2">
				<input type="url" id="url-input" placeholder="https://contoh.com/audio.mp3" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
				<button id="load-url-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors whitespace-nowrap">
				  <i class="fa-solid fa-download mr-1"></i> Muat
				</button>
			  </div>
			  <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-circle-info mr-1"></i>Pastikan URL adalah direct link audio (bukan halaman web).</p>
			</div>
		  </div>
		</div>

		<!-- Player Area -->
		<div class="bg-slate-800/80 rounded-2xl p-5 border border-slate-700/50 shadow-inner">

		  <!-- Track Info -->
		  <div class="flex items-center gap-4 mb-6">
			<div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 flex-shrink-0 relative overflow-hidden">
			  <div id="disk-center" class="absolute w-4 h-4 bg-slate-800 rounded-full z-10 transition-transform duration-500"></div>
			  <i id="cd-icon" class="fa-solid fa-compact-disc text-3xl text-white/80 animate-spin" style="animation-duration: 3s; animation-play-state: paused;"></i>
			</div>
			<div class="overflow-hidden w-full">
			  <h2 id="track-name" class="text-lg font-bold truncate text-white">Belum ada file</h2>
			  <p id="track-source" class="text-xs text-slate-400 truncate mt-1">Pilih sumber audio di atas</p>
			</div>
		  </div>

		  <!-- Progress Bar -->
		  <div class="mb-4">
			<input type="range" id="seek-slider" min="0" max="100" value="0" step="1" class="w-full" disabled>
			<div class="flex justify-between mt-2 text-xs font-medium text-slate-400 font-mono">
			  <span id="current-time">00:00</span>
			  <span id="duration-time">00:00</span>
			</div>
		  </div>

		  <!-- Controls -->
		  <div class="flex items-center justify-between">
			<!-- Volume Control -->
			<div class="flex items-center gap-2 w-1/4 group relative">
			  <button id="mute-btn" class="text-slate-400 hover:text-white transition-colors w-6">
				<i class="fa-solid fa-volume-high" id="volume-icon"></i>
			  </button>
			  <input type="range" id="volume-slider" min="0" max="1" value="1" step="0.05" class="w-16 opacity-0 group-hover:opacity-100 transition-opacity absolute left-8">
			</div>

			<!-- Playback Controls -->
			<div class="flex items-center gap-4 w-2/4 justify-center">
			  <button id="rewind-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
				<i class="fa-solid fa-backward-step"></i>
			  </button>

			  <button id="play-pause-btn" class="w-14 h-14 rounded-full flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/30 transition-all transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100" disabled>
				<i class="fa-solid fa-play text-xl ml-1" id="play-icon"></i>
			  </button>

			  <button id="forward-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
				<i class="fa-solid fa-forward-step"></i>
			  </button>
			</div>

			<!-- Extra / Loop Control -->
			<div class="flex justify-end w-1/4">
			  <button id="loop-btn" class="text-slate-400 hover:text-white transition-colors">
				<i class="fa-solid fa-repeat"></i>
			  </button>
			</div>
		  </div>
		</div>
	  </div>
    </main>

    <!-- Custom Toast Message -->
    <div id="toast" class="toast">
	  <span id="toast-message">Pesan error disini</span>
    </div>

<script>
        // DOM Elements
        const audio = new Audio();
        let currentObjectURL = null;

        // Tabs
        const tabLocal = document.getElementById('tab-local');
        const tabUrl = document.getElementById('tab-url');
        const inputLocal = document.getElementById('input-local');
        const inputUrl = document.getElementById('input-url');

        // Inputs
        const fileUpload = document.getElementById('file-upload');
        const urlInput = document.getElementById('url-input');
        const loadUrlBtn = document.getElementById('load-url-btn');

        // Track Info
        const trackName = document.getElementById('track-name');
        const trackSource = document.getElementById('track-source');
        const cdIcon = document.getElementById('cd-icon');
        const statusIndicator = document.getElementById('status-indicator');

        // Controls
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const seekSlider = document.getElementById('seek-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');
        const volumeSlider = document.getElementById('volume-slider');
        const muteBtn = document.getElementById('mute-btn');
        const volumeIcon = document.getElementById('volume-icon');
        const rewindBtn = document.getElementById('rewind-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const loopBtn = document.getElementById('loop-btn');
        
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // Helper Functions
        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function showToast(message, isError = true) {
            toastMessage.textContent = message;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981'; // Red or Green
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function setStatus(status, type = 'ready') {
            let indicatorHtml = '';
            if (type === 'playing') {
                indicatorHtml = `
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span class="text-blue-400">${status}</span>`;
                cdIcon.style.animationPlayState = 'running';
            } else if (type === 'error') {
                indicatorHtml = `
                <span class="relative flex h-3 w-3">
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                <span class="text-red-400">${status}</span>`;
                cdIcon.style.animationPlayState = 'paused';
            } else {
                indicatorHtml = `
                <span class="relative flex h-3 w-3">
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-slate-500"></span>
                </span>
                <span>${status}</span>`;
                cdIcon.style.animationPlayState = 'paused';
            }
            statusIndicator.innerHTML = indicatorHtml;
        }

        function enableControls() {
            playPauseBtn.disabled = false;
            seekSlider.disabled = false;
            rewindBtn.disabled = false;
            forwardBtn.disabled = false;
        }

        // Tab Logic
        window.switchTab = function(tab) {
            if (tab === 'local') {
                // UI Updates
                tabLocal.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white shadow transition-all";
                tabUrl.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all";
                inputLocal.classList.remove('hidden');
                inputUrl.classList.add('hidden');
            } else {
                // UI Updates
                tabUrl.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white shadow transition-all";
                tabLocal.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all";
                inputUrl.classList.remove('hidden');
                inputLocal.classList.add('hidden');
            }
        };

        // File Upload Logic (Offline Capable)
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('audio/')) {
                showToast("Tolong pilih file audio yang valid!");
                return;
            }

            // Revoke previous URL to free memory
            if (currentObjectURL) {
                URL.revokeObjectURL(currentObjectURL);
            }

            currentObjectURL = URL.createObjectURL(file);
            audio.src = currentObjectURL;
            
            trackName.textContent = file.name;
            trackSource.textContent = "File Lokal (Offline)";
            
            audio.load();
            playAudio();
            enableControls();
        });

        // URL Load Logic
        loadUrlBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) {
                showToast("Tolong masukkan URL terlebih dahulu.");
                return;
            }

            audio.src = url;
            
            // Try to extract filename from URL, otherwise use a generic name
            const urlParts = url.split('/');
            let possibleName = urlParts[urlParts.length - 1];
            if (possibleName.indexOf('?') > -1) possibleName = possibleName.split('?')[0];
            
            trackName.textContent = possibleName || "Audio URL";
            trackSource.textContent = "URL Online";
            
            setStatus("Memuat...", "ready");
            audio.load();
            playAudio();
            enableControls();
        });

        // Playback Logic
        function playAudio() {
            audio.play().then(() => {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                playIcon.classList.remove('ml-1'); // Adjust alignment for pause icon
                setStatus("Memutar", "playing");
            }).catch(error => {
                console.error("Playback error:", error);
                showToast("Gagal memutar audio. Format tidak didukung atau URL tidak valid.");
                setStatus("Error", "error");
            });
        }

        function pauseAudio() {
            audio.pause();
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
            playIcon.classList.add('ml-1');
            setStatus("Dijeda", "ready");
        }

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                playAudio();
            } else {
                pauseAudio();
            }
        });

        rewindBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        forwardBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        // Loop Toggle
        loopBtn.addEventListener('click', () => {
            audio.loop = !audio.loop;
            if (audio.loop) {
                loopBtn.classList.replace('text-slate-400', 'text-blue-400');
                showToast("Mode Ulang Diaktifkan", false);
            } else {
                loopBtn.classList.replace('text-blue-400', 'text-slate-400');
                showToast("Mode Ulang Dinonaktifkan", false);
            }
        });

        // Time & Progress Bar Updates
        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = formatTime(audio.duration);
            seekSlider.max = Math.floor(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.currentTime)) {
                seekSlider.value = Math.floor(audio.currentTime);
                currentTimeEl.textContent = formatTime(audio.currentTime);
                
                // Optional: Update CSS custom property for coloring the track before the thumb
                const percentage = (audio.currentTime / audio.duration) * 100;
                seekSlider.style.background = `linear-gradient(to right, #3b82f6 ${percentage}%, #475569 ${percentage}%)`;
            }
        });

        seekSlider.addEventListener('input', () => {
            audio.currentTime = seekSlider.value;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // Volume Control
        volumeSlider.addEventListener('input', (e) => {
            const vol = parseFloat(e.target.value);
            audio.volume = vol;
            updateVolumeIcon(vol);
        });

        muteBtn.addEventListener('click', () => {
            if (audio.volume > 0) {
                // Mute
                audio.dataset.savedVolume = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
            } else {
                // Unmute
                const savedVol = audio.dataset.savedVolume || 1;
                audio.volume = savedVol;
                volumeSlider.value = savedVol;
            }
            updateVolumeIcon(audio.volume);
        });

        function updateVolumeIcon(vol) {
            volumeIcon.className = '';
            if (vol === 0) {
                volumeIcon.className = 'fa-solid fa-volume-xmark text-red-400';
            } else if (vol < 0.5) {
                volumeIcon.className = 'fa-solid fa-volume-low';
            } else {
                volumeIcon.className = 'fa-solid fa-volume-high';
            }
        }

        // End of track handling
        audio.addEventListener('ended', () => {
            if (!audio.loop) {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                playIcon.classList.add('ml-1');
                setStatus("Selesai", "ready");
                audio.currentTime = 0;
            }
        });

        // Error Handling
        audio.addEventListener('error', (e) => {
            showToast("Terjadi kesalahan memuat audio. Mungkin link mati atau format salah.");
            setStatus("Error", "error");
            playPauseBtn.disabled = true;
        });

        // Drag and Drop (Local Files)
        const dropZone = document.querySelector('label[for="file-upload"]');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('bg-slate-700', 'border-blue-500');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('bg-slate-700', 'border-blue-500');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            
            if(files.length) {
                fileUpload.files = files;
                // trigger change event
                const event = new Event('change');
                fileUpload.dispatchEvent(event);
            }
        });

</script>
  </body>
</html>
