<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Player & Playlist</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
<style>
        /* Custom scrollbar for the playlist */
        .playlist-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .playlist-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; /* Tailwind slate-300 */
            border-radius: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; /* Tailwind slate-400 */
        }
        
        /* Active item style */
        .playlist-item.active {
            background-color: #e2e8f0; /* Tailwind slate-200 */
            border-left: 4px solid #ef4444; /* Tailwind red-500 */
        }
</style>
  </head>
  <body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-6xl w-full bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">

	  <!-- Left Column: Video Player and Info -->
	  <div class="w-full md:w-2/3 p-4 flex flex-col">
		<!-- Container for YouTube IFrame -->
		<div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden" id="player-container">
		  <div id="youtube-player"></div>
		</div>

		<!-- Video Info Section -->
		<div class="mt-4 p-4 bg-gray-50 rounded-lg shadow-sm border border-gray-100">
		  <h2 id="video-title" class="text-xl md:text-2xl font-bold text-gray-900 mb-2 truncate" title="Memuat Judul...">Memuat Judul...</h2>
		  <div class="flex items-center justify-between text-sm text-gray-600 mb-4 border-b border-gray-200 pb-2">
			<span id="video-author" class="font-medium">Channel Name</span>
			<span id="video-date">Tanggal Rilis</span>
		  </div>
		  <div class="h-24 overflow-y-auto pr-2 text-gray-700 text-sm leading-relaxed" id="video-description">
			Memuat deskripsi video...
		  </div>
		</div>
	  </div>

	  <!-- Right Column: Playlist -->
	  <div class="w-full md:w-1/3 bg-gray-50 border-l border-gray-200 flex flex-col h-[500px] md:h-auto">
		<div class="p-4 bg-white border-b border-gray-200 sticky top-0 z-10 flex justify-between items-center shadow-sm">
		  <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
			<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
			  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
			</svg>
			Playlist
		  </h3>
		  <span class="text-xs font-semibold bg-gray-200 text-gray-700 px-2 py-1 rounded-full" id="playlist-count">0 Video</span>
		</div>

		<!-- Playlist Items Container -->
		<div class="flex-1 overflow-y-auto playlist-scroll p-2 space-y-2" id="playlist-container">
		  <!-- Items will be injected here by JavaScript -->
		</div>
	  </div>
    </div>

<script>
        // 1. Data Playlist (Berisi ID Video YouTube)
        const playlistData = [
            {
                id: 'dQw4w9WgXcQ',
                title: 'Rick Astley - Never Gonna Give You Up (Official Music Video)',
                author: 'Rick Astley',
                date: '24 Okt 2009',
                description: 'The official video for “Never Gonna Give You Up” by Rick Astley. "Never Gonna Give You Up" was a global smash on its release in July 1987, topping the charts in 25 countries including Rick’s native UK and the US Billboard Hot 100.',
                thumbnail: 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg'
            },
            {
                id: 'jNQXAC9IVRw',
                title: 'Me at the zoo',
                author: 'jawed',
                date: '24 Apr 2005',
                description: 'The first video on YouTube, uploaded at 8:27PM on Saturday April 23rd, 2005. The video was shot by Yakov Lapitsky at the San Diego Zoo.',
                thumbnail: 'https://img.youtube.com/vi/jNQXAC9IVRw/mqdefault.jpg'
            },
            {
                id: '9bZkp7q19f0',
                title: 'PSY - GANGNAM STYLE(강남스타일) M/V',
                author: 'officialpsy',
                date: '15 Jul 2012',
                description: 'PSY - ‘I LUV IT’ M/V @ https://youtu.be/Xvjnoagk6GU\nPSY - ‘New Face’ M/V @https://youtu.be/OwJPPaEYcgw\nPSY - 8TH ALBUM \'4X2=8\' on iTunes @\nhttps://smarturl.it/PSY_8thAlbum',
                thumbnail: 'https://img.youtube.com/vi/9bZkp7q19f0/mqdefault.jpg'
            },
             {
                id: 'kJQP7kiw5Fk',
                title: 'Luis Fonsi - Despacito ft. Daddy Yankee',
                author: 'Luis Fonsi',
                date: '13 Jan 2017',
                description: '“Despacito” disponible ya en todas las plataformas digitales: https://UMLE.lnk.to/DOoUzFp \nSigue a Luis Fonsi: \nOfficial Site: http://www.luisfonsi.com/ \nFacebook: https://www.facebook.com/luisfonsi/ \nTwitter: https://twitter.com/LuisFonsi \nInstagram: https://www.instagram.com/luisfonsi',
                thumbnail: 'https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg'
            },
            {
                id: 'JGwWNGJdvx8',
                title: 'Ed Sheeran - Shape of You (Official Music Video)',
                author: 'Ed Sheeran',
                date: '30 Jan 2017',
                description: 'The official music video for Ed Sheeran - Shape Of You\nTaken from the studio album ÷ (divide) released in 2017, which featured the hit singles \'Castle on the Hill\', \'Shape of You\', \'Galway Girl\', \'Perfect\' & \'Happier\'.',
                thumbnail: 'https://img.youtube.com/vi/JGwWNGJdvx8/mqdefault.jpg'
            }
        ];

        let player;
        let currentVideoIndex = 0;

        // 2. Muat YouTube IFrame API secara Asinkron
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. Fungsi ini dipanggil secara otomatis oleh YouTube API setelah siap
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: playlistData[0].id, // Mulai dengan video pertama
                playerVars: {
                    'playsinline': 1,
                    'rel': 0, // Jangan tampilkan video terkait dari channel lain
                    'modestbranding': 1 // Kurangi branding YouTube
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Player siap
            updateVideoInfo(currentVideoIndex);
            renderPlaylist();
        }

        function onPlayerStateChange(event) {
            // Saat video selesai (status 0)
            if (event.data == YT.PlayerState.ENDED) {
                playNextVideo();
            }
        }

        function playNextVideo() {
            currentVideoIndex++;
            if (currentVideoIndex >= playlistData.length) {
                currentVideoIndex = 0; // Ulangi dari awal jika sudah di akhir
            }
            loadVideo(currentVideoIndex);
        }

        function loadVideo(index) {
            currentVideoIndex = index;
            const videoId = playlistData[index].id;
            
            // Muat video ke player
            if(player && player.loadVideoById) {
                player.loadVideoById(videoId);
            }

            updateVideoInfo(index);
            updatePlaylistUI();
        }

        function updateVideoInfo(index) {
            const video = playlistData[index];
            document.getElementById('video-title').textContent = video.title;
            document.getElementById('video-title').title = video.title;
            document.getElementById('video-author').textContent = video.author;
            document.getElementById('video-date').textContent = video.date;
            
            // Format deskripsi agar ganti baris berfungsi
            const formattedDesc = video.description.replace(/\n/g, '<br>');
            document.getElementById('video-description').innerHTML = formattedDesc;
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = ''; // Kosongkan dulu
            
            document.getElementById('playlist-count').textContent = `${playlistData.length} Video`;

            playlistData.forEach((video, index) => {
                const isActive = index === currentVideoIndex ? 'active' : '';
                
                const itemHTML = `
                    <div class="playlist-item ${isActive} flex gap-3 p-2 rounded-lg cursor-pointer hover:bg-gray-200 transition-colors duration-200 border border-transparent" 
                         onclick="loadVideo(${index})">
                        
                        <!-- Thumbnail Area -->
                        <div class="relative w-28 h-16 flex-shrink-0 bg-gray-300 rounded overflow-hidden">
                            <img src="${video.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover">
                            ${index === currentVideoIndex ? 
                                `<div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>` 
                            : ''}
                            <div class="absolute bottom-1 right-1 bg-black/80 text-white text-[10px] px-1 rounded">
                                <!-- Durasi dummy, untuk implementasi nyata butuh Data API -->
                                ▶
                            </div>
                        </div>

                        <!-- Info Area -->
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <h4 class="text-sm font-semibold text-gray-900 line-clamp-2 leading-tight mb-1">${video.title}</h4>
                            <p class="text-xs text-gray-500 truncate">${video.author}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
            
            // Scroll ke item aktif
            scrollToActiveItem();
        }

        function updatePlaylistUI() {
            // Render ulang playlist untuk memperbarui state 'active'
            renderPlaylist();
        }

        function scrollToActiveItem() {
            setTimeout(() => {
                const activeItem = document.querySelector('.playlist-item.active');
                const container = document.getElementById('playlist-container');
                if (activeItem && container) {
                    // Cek apakah item terlihat di viewport container
                    const containerRect = container.getBoundingClientRect();
                    const itemRect = activeItem.getBoundingClientRect();

                    if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) {
                         activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            }, 100);
        }

</script>
  </body>
</html>
