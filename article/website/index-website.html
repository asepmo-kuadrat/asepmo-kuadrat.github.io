<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajer Website Favorit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        /* Transisi halus untuk interaksi tombol dan list */
        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
</style>
  </head>
  <body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8">

    <header class="w-full max-w-4xl mb-8 text-center">
	  <h1 class="text-4xl font-bold text-indigo-600 mb-2 flex items-center justify-center gap-3">
		<i data-lucide="globe" class="w-10 h-10"></i>
		Manajer Website
	  </h1>
	  <p class="text-gray-500">Kelola daftar website populer dan simpan favorit Anda.</p>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">

	  <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col">
		<h2 class="text-2xl font-semibold mb-4 flex items-center gap-2 border-b pb-2">
		  <i data-lucide="trending-up" class="w-6 h-6 text-blue-500"></i>
		  Populer di Google
		</h2>
		<ul id="popular-list" class="space-y-3 flex-grow overflow-y-auto max-h-[500px] pr-2">
		  <!-- List akan dirender oleh JavaScript -->
		</ul>
	  </section>

	  <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col">
		<h2 class="text-2xl font-semibold mb-4 flex items-center gap-2 border-b pb-2">
		  <i data-lucide="star" class="w-6 h-6 text-yellow-500 fill-current"></i>
		  Website Favorit
		</h2>

		<div class="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
		  <h3 class="text-sm font-medium text-gray-700 mb-2">Tambah Baru</h3>
		  <form id="add-form" class="flex flex-col gap-3">
			<div>
			  <input type="text" id="site-name" placeholder="Nama Website (mis. OpenAI)" required
				class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
			</div>
			<div>
			  <input type="url" id="site-url" placeholder="URL (mis. https://openai.com)" required
				class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
			</div>
			<button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
			  <i data-lucide="plus-circle" class="w-5 h-5"></i>
			  Simpan Favorit
			</button>
		  </form>
		  <div id="error-message" class="text-red-500 text-sm mt-2 hidden">URL tidak valid. Harap sertakan http:// atau https://</div>
		</div>

		<ul id="favorite-list" class="space-y-3 flex-grow overflow-y-auto max-h-[350px] pr-2">
		  <!-- List akan dirender oleh JavaScript -->
		</ul>

		<div id="empty-state" class="hidden flex-col items-center justify-center py-10 text-gray-400">
		  <i data-lucide="inbox" class="w-12 h-12 mb-3 opacity-50"></i>
		  <p>Belum ada website favorit.</p>
		</div>
	  </section>
    </main>

    <div id="delete-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
	  <div class="bg-white rounded-xl p-6 max-w-sm w-full mx-4 shadow-2xl">
		<h3 class="text-lg font-bold mb-2 text-gray-900">Hapus Favorit?</h3>
		<p class="text-gray-600 mb-6">Apakah Anda yakin ingin menghapus <span id="delete-target-name" class="font-semibold text-gray-800"></span> dari daftar favorit?</p>
		<div class="flex justify-end gap-3">
		  <button id="cancel-delete" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">Batal</button>
		  <button id="confirm-delete" class="px-4 py-2 text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">Hapus</button>
		</div>
	  </div>
    </div>

<script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        // Data Awal In-Memory
        const popularWebsites = [
            { name: "Google", url: "https://www.google.com", domain: "google.com" },
            { name: "YouTube", url: "https://www.youtube.com", domain: "youtube.com" },
            { name: "Facebook", url: "https://www.facebook.com", domain: "facebook.com" },
            { name: "Twitter / X", url: "https://twitter.com", domain: "twitter.com" },
            { name: "Instagram", url: "https://www.instagram.com", domain: "instagram.com" },
            { name: "Wikipedia", url: "https://www.wikipedia.org", domain: "wikipedia.org" },
            { name: "Amazon", url: "https://www.amazon.com", domain: "amazon.com" },
            { name: "Reddit", url: "https://www.reddit.com", domain: "reddit.com" }
        ];

        let favoriteWebsites = [
            { id: 1, name: "GitHub", url: "https://github.com", domain: "github.com" },
            { id: 2, name: "Stack Overflow", url: "https://stackoverflow.com", domain: "stackoverflow.com" }
        ];

        // Elemen DOM
        const popularListEl = document.getElementById('popular-list');
        const favoriteListEl = document.getElementById('favorite-list');
        const addForm = document.getElementById('add-form');
        const siteNameInput = document.getElementById('site-name');
        const siteUrlInput = document.getElementById('site-url');
        const errorMessage = document.getElementById('error-message');
        const emptyState = document.getElementById('empty-state');
        
        // Modal Elements
        const deleteModal = document.getElementById('delete-modal');
        const confirmDeleteBtn = document.getElementById('confirm-delete');
        const cancelDeleteBtn = document.getElementById('cancel-delete');
        const deleteTargetName = document.getElementById('delete-target-name');
        let itemToDeleteId = null;

        // Fungsi Helper untuk mendapatkan Favicon URL (Menggunakan layanan Google S2)
        function getFaviconUrl(domain) {
            return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        }

        // Ekstrak domain dari URL untuk favicon
        function extractDomain(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.hostname;
            } catch (e) {
                return ""; // Fallback jika URL tidak valid
            }
        }

        function renderPopular() {
            popularListEl.innerHTML = '';
            popularWebsites.forEach(site => {
                const li = document.createElement('li');
                li.className = 'flex items-center p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors border border-gray-100 hover-lift';
                
                const faviconUrl = getFaviconUrl(site.domain);
                
                li.innerHTML = `
                    <img src="${faviconUrl}" alt="${site.name} icon" class="w-8 h-8 rounded-full bg-white p-1 border border-gray-200 mr-4" onerror="this.src='https://placehold.co/64x64/e2e8f0/64748b?text=W'">
                    <div class="flex-grow">
                        <h4 class="font-medium text-gray-800">${site.name}</h4>
                        <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="text-xs text-blue-500 hover:underline truncate block max-w-[200px] sm:max-w-[300px]">${site.url}</a>
                    </div>
                    <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="p-2 text-gray-400 hover:text-indigo-600 transition-colors rounded-lg hover:bg-white" title="Kunjungi Website">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </a>
                `;
                popularListEl.appendChild(li);
            });
            lucide.createIcons({ root: popularListEl });
        }

        function renderFavorites() {
            favoriteListEl.innerHTML = '';
            
            if (favoriteWebsites.length === 0) {
                favoriteListEl.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            } else {
                favoriteListEl.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            favoriteWebsites.forEach(site => {
                const li = document.createElement('li');
                li.className = 'flex items-center p-3 bg-white border border-gray-200 rounded-xl hover:border-indigo-300 transition-colors group hover-lift shadow-sm';
                
                const faviconUrl = getFaviconUrl(site.domain);
                
                li.innerHTML = `
                    <img src="${faviconUrl}" alt="${site.name} icon" class="w-8 h-8 rounded bg-gray-50 p-0.5 border border-gray-100 mr-4 object-contain" onerror="this.src='https://placehold.co/64x64/e2e8f0/64748b?text=F'">
                    <div class="flex-grow min-w-0">
                        <h4 class="font-medium text-gray-800 truncate">${site.name}</h4>
                        <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="text-xs text-indigo-500 hover:underline truncate block">${site.url}</a>
                    </div>
                    <div class="flex items-center gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                         <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="p-2 text-gray-400 hover:text-indigo-600 bg-gray-50 hover:bg-indigo-50 rounded-lg transition-colors" title="Buka">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                        <button onclick="promptDelete(${site.id}, '${site.name}')" class="p-2 text-gray-400 hover:text-red-600 bg-gray-50 hover:bg-red-50 rounded-lg transition-colors" title="Hapus">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                favoriteListEl.appendChild(li);
            });
            lucide.createIcons({ root: favoriteListEl });
        }

        addForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorMessage.classList.add('hidden');

            const name = siteNameInput.value.trim();
            let url = siteUrlInput.value.trim();

            // Validasi URL sederhana
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                // Mencoba memperbaiki jika user lupa http
                url = 'https://' + url;
            }

            try {
                new URL(url); // Tes apakah valid
            } catch (_) {
                errorMessage.classList.remove('hidden');
                return;
            }

            const domain = extractDomain(url);
            
            const newSite = {
                id: Date.now(), // ID sederhana menggunakan timestamp
                name: name,
                url: url,
                domain: domain
            };

            favoriteWebsites.unshift(newSite); // Tambahkan ke atas
            renderFavorites();

            // Reset form
            siteNameInput.value = '';
            siteUrlInput.value = '';
            siteNameInput.focus();
        });

        // Fungsi ini dipanggil dari button onclick di renderFavorites
        window.promptDelete = function(id, name) {
            itemToDeleteId = id;
            deleteTargetName.textContent = name;
            deleteModal.classList.remove('hidden');
        };

        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.add('hidden');
            itemToDeleteId = null;
        });

        confirmDeleteBtn.addEventListener('click', () => {
            if (itemToDeleteId !== null) {
                favoriteWebsites = favoriteWebsites.filter(site => site.id !== itemToDeleteId);
                renderFavorites();
                deleteModal.classList.add('hidden');
                itemToDeleteId = null;
            }
        });

        // Tutup modal jika klik di luar box
        deleteModal.addEventListener('click', (e) => {
            if (e.target === deleteModal) {
                deleteModal.classList.add('hidden');
                itemToDeleteId = null;
            }
        });

        renderPopular();
        renderFavorites();

</script>
  </body>
</html>
