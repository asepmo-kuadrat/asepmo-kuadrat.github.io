        // --- UI Functions ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawerOverlay');
            isDrawerOpen = !isDrawerOpen;

            if (isDrawerOpen) {
                drawer.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                document.body.style.overflow = 'hidden';
            } else {
                drawer.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.style.overflow = 'auto';
            }
        }

        function toggleOptions() {
            const menu = document.getElementById('optionsMenu');
            isOptionsOpen = !isOptionsOpen;
            if (isOptionsOpen) {
                menu.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
            }
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', function(e) {
            if (!document.getElementById('optionsMenu').contains(e.target) && !e.target.closest('button[onclick="toggleOptions()"]')) {
                if (isOptionsOpen) {
                    toggleOptions();
                }
            }
        });

        function copyText(text) {
            // Menggunakan execCommand sebagai alternatif untuk iFrame yang menyekat Clipboard API
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('Teks disalin ke clipboard!');
            } catch (err) {
                showToast('Gagal menyalin teks.');
            }
            document.body.removeChild(textArea);
        }

&lt;/div&gt;</textarea>

                            <!-- Preview Content will be injected here via JS -->
                        </div>

                </div>
                <script>
                    // Internal script for Editor page logic
                    window.switchEditorTab = function(tab) {
                        const btnEdit = document.getElementById('btn-edit');
                        const btnPreview = document.getElementById('btn-preview');
                        const viewEdit = document.getElementById('view-edit');
                        const viewPreview = document.getElementById('view-preview');

                        if(tab === 'edit') {
                            btnEdit.classList.add('bg-slate-700', 'text-white', 'shadow-sm');
                            btnEdit.classList.remove('text-slate-400', 'hover:text-white');
                            
                            btnPreview.classList.remove('bg-slate-700', 'text-white', 'shadow-sm');
                            btnPreview.classList.add('text-slate-400', 'hover:text-white');

                            viewEdit.classList.remove('hidden');
                            viewPreview.classList.add('hidden');
                        } else {
                            btnPreview.classList.add('bg-slate-700', 'text-white', 'shadow-sm');
                            btnPreview.classList.remove('text-slate-400', 'hover:text-white');
                            
                            btnEdit.classList.remove('bg-slate-700', 'text-white', 'shadow-sm');
                            btnEdit.classList.add('text-slate-400', 'hover:text-white');

                            viewEdit.classList.add('hidden');
                            viewPreview.classList.remove('hidden');

                            // Inject code to preview
                            const code = document.getElementById('editor-textarea').value;
                            viewPreview.innerHTML = code;
                        }
                    };

        // --- Router Logic ---
        function navigate(pageName) {
            const contentArea = document.getElementById('app-content');
            
            // Validate page
            if (!pageContent[pageName]) pageName = 'home';
            
            // Render Content
            contentArea.innerHTML = pageContent[pageName];
            
            // Execute internal scripts if any (needed for Editor tab logic)
            const scripts = contentArea.getElementsByTagName("script");
            for (let i = 0; i < scripts.length; i++) {
                eval(scripts[i].innerText);
            }

            // Update UI State (Close menus)
            if (isDrawerOpen) toggleDrawer();
            if (isOptionsOpen) toggleOptions();

            // Highlight Active Drawer Link
            document.querySelectorAll('.drawer-link').forEach(link => {
                link.classList.remove('bg-brand-50', 'text-brand-600');
                link.classList.add('text-slate-700');
            });
            const activeLink = document.querySelector(`.drawer-link[onclick="navigate('${pageName}')"]`);
            if(activeLink) {
                activeLink.classList.remove('text-slate-700');
                activeLink.classList.add('bg-brand-50', 'text-brand-600');
            }

            // Scroll to top smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize App

        });
